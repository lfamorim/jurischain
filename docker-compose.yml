services:
  # ── Build: compiles C -> ASM.js and creates the bundle ──
  build:
    image: emscripten/emsdk:3.1.51
    working_dir: /src
    volumes:
      - .:/src
    command: make clean all
    profiles:
      - build

  # ── Serve: builds everything via multi-stage, serves with nginx ──
  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: serve
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── Test ASM.js CLI (Emscripten + Node) ──
  test-asm:
    image: emscripten/emsdk:3.1.51
    working_dir: /src
    volumes:
      - .:/src
    command: >
      sh -c "
        echo '=== Building ASM.js ===' &&
        make clean all &&
        echo '' &&
        echo '=== Running CLI test (difficulty=5) ===' &&
        node dist/jurischain-cli.js 5 TestSeed &&
        echo '' &&
        echo '=== Verifying bundle ===' &&
        ls -lh dist/jurischain-bundle.js &&
        echo '' &&
        echo '=== ASM.js tests passed ==='
      "
    profiles:
      - test

  # ── Test PHP 8 Extension ──
  test-php:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test-php
    profiles:
      - test

  # ── Test Node.js Native Addon ──
  test-node:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test-node
    profiles:
      - test

  # ── Test Python ──
  test-python:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
      target: test-python
    profiles:
      - test
